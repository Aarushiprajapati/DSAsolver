services:
  - type: web
    name: dsasolver-api
    env: node
    plan: free
    buildCommand: npm install && npm run init-db && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        fromConfig: firebase_project_id
      - key: CLIENT_URL
        fromConfig: client_url
    rootDir: server

  - type: web
    name: dsasolver-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromConfig: dsasolver-api/url
      - key: VITE_FIREBASE_API_KEY
        fromConfig: firebase_api_key
      - key: VITE_FIREBASE_AUTH_DOMAIN
        fromConfig: firebase_auth_domain
      - key: VITE_FIREBASE_PROJECT_ID
        fromConfig: firebase_project_id
      - key: VITE_FIREBASE_STORAGE_BUCKET
        fromConfig: firebase_storage_bucket
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        fromConfig: firebase_messaging_sender_id
      - key: VITE_FIREBASE_APP_ID
        fromConfig: firebase_app_id
